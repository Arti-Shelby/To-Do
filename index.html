<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To-Do App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" />
    <link rel="stylesheet" href="scss/style.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div id="form">
                    <div class="input-group input-group-large">
                        <input type="text" id="newtask" class="form-control" placeholder="Enter a new todo item" autocomplete="off">
                        <button class="btn btn-primary" type="sumbit" id="btn-add"><em class="fa fa-plus"></em></button>
                    </div>
                    
                    <p><small>You can press enter or click the + button to add a new item.</small></p>
                    <ul class="todos" id="todos">
                            <li>Task 1</li>
                            <li>Task 2</li>
                            <li>Task 3</li>
                            <li>Task 4</li>
                            <li>Task 5</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <script src="init.js"></script>
</body>
</html>
